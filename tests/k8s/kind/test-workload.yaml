apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcp-smoke-target
  namespace: homelab-k3s-mcp
  labels:
    app.kubernetes.io/name: mcp-smoke-target
    app.kubernetes.io/component: smoke-target
    app.kubernetes.io/part-of: homelab-k3s-mcp
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: mcp-smoke-target
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mcp-smoke-target
    spec:
      automountServiceAccountToken: false
      containers:
        - name: pause
          image: registry.k8s.io/pause:3.10
          resources:
            requests:
              cpu: 5m
              memory: 8Mi
            limits:
              cpu: 50m
              memory: 16Mi
