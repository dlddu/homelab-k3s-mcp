apiVersion: v1
kind: Namespace
metadata:
  name: workload-test
  labels:
    app.kubernetes.io/part-of: homelab-k3s-mcp-tests
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: workload-fixture
  namespace: workload-test
  labels:
    app.kubernetes.io/name: workload-fixture
    app.kubernetes.io/part-of: homelab-k3s-mcp-tests
spec:
  replicas: 1
  selector:
    matchLabels:
      app: workload-fixture
  template:
    metadata:
      labels:
        app: workload-fixture
    spec:
      containers:
        - name: pause
          image: registry.k8s.io/pause:3.9
          resources:
            requests:
              cpu: 1m
              memory: 4Mi
            limits:
              cpu: 50m
              memory: 16Mi
---
# Crash-once fixture for the workload_logs previous=true scenario
# (test-workload-logs.md S3 / AC3). The first container instance prints a
# known marker line and exits non-zero; every later instance finds the
# emptyDir sentinel and stays Running. That pins lastState.terminated to the
# marker-printing instance, so previous=true deterministically returns the
# marker. A perpetual crash loop is deliberately avoided: rapid restarts let
# containerd GC the previous instance mid-read ("unable to retrieve container
# logs for containerd://..."), which made the E2E flaky.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: crashloop-fixture
  namespace: workload-test
  labels:
    app.kubernetes.io/name: crashloop-fixture
    app.kubernetes.io/part-of: homelab-k3s-mcp-tests
spec:
  replicas: 1
  selector:
    matchLabels:
      app: crashloop-fixture
  template:
    metadata:
      labels:
        app: crashloop-fixture
    spec:
      volumes:
        - name: state
          emptyDir: {}
      containers:
        - name: boom
          image: busybox:1.36
          command:
            - sh
            - -c
            - >-
              if [ ! -f /state/crashed ]; then
              echo "crashloop-fixture: boom before exit";
              touch /state/crashed;
              sleep 1;
              exit 1;
              fi;
              echo "crashloop-fixture: recovered";
              exec sleep 2147483647
          volumeMounts:
            - name: state
              mountPath: /state
          resources:
            requests:
              cpu: 1m
              memory: 4Mi
            limits:
              cpu: 50m
              memory: 16Mi
