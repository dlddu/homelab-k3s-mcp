apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: homelab-k3s-mcp

resources:
  - ../../../k8s

images:
  - name: ghcr.io/dlddu/homelab-k3s-mcp
    newName: homelab-k3s-mcp
    newTag: ci

configMapGenerator:
  - name: homelab-k3s-mcp-oauth
    literals:
      - MCP_AUTH_DISABLED=1
    options:
      disableNameSuffixHash: true

patches:
  # CI-only: inject the OPENSEARCH_* secretRef so the opensearch_* tools run
  # against the kind fixture. The production k8s/ base gains this secretRef
  # only after the ExternalSecret exists in the cluster (plan stage 6); once
  # it moves into the base, drop this patch.
  - target:
      kind: Deployment
      name: homelab-k3s-mcp
    patch: |-
      - op: add
        path: /spec/template/spec/containers/0/envFrom/-
        value:
          secretRef:
            name: homelab-k3s-mcp-opensearch
