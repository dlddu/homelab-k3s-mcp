apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: homelab-k3s-mcp

resources:
  - ../../../k8s

images:
  - name: ghcr.io/dlddu/homelab-k3s-mcp
    newName: homelab-k3s-mcp
    newTag: ci

configMapGenerator:
  - name: homelab-k3s-mcp-oauth
    literals:
      - MCP_AUTH_DISABLED=1
    options:
      disableNameSuffixHash: true
  - name: homelab-k3s-mcp-github-app
    literals:
      - GITHUB_APP_CLIENT_ID=Iv1.testclientid12345
      - GITHUB_APP_INSTALLATION_ID=67890
      - GITHUB_API_BASE_URL=http://github-mock.github-mock.svc.cluster.local
    options:
      disableNameSuffixHash: true
