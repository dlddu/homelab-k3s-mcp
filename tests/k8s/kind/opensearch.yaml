apiVersion: v1
kind: Namespace
metadata:
  name: opensearch
  labels:
    app.kubernetes.io/part-of: homelab-k3s-mcp-tests
---
# Single-node OpenSearch standing in for the AWS OpenSearch Serverless
# collection. The security plugin is disabled, so the server's SigV4-signed
# requests are accepted as-is; combined with the MinIO STS endpoint this
# exercises the full AssumeRole -> SigV4 -> data-plane path of the
# opensearch_* tools end-to-end without touching real AWS.
#
# The JVM heap is pinned to 512Mi and container limits are set explicitly to
# keep the fixture from starving the shared CI runner.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: opensearch
  namespace: opensearch
  labels:
    app.kubernetes.io/name: opensearch
    app.kubernetes.io/part-of: homelab-k3s-mcp-tests
spec:
  replicas: 1
  selector:
    matchLabels:
      app: opensearch
  template:
    metadata:
      labels:
        app: opensearch
    spec:
      containers:
        - name: opensearch
          image: opensearchproject/opensearch:2
          env:
            - name: discovery.type
              value: single-node
            - name: DISABLE_SECURITY_PLUGIN
              value: "true"
            - name: DISABLE_INSTALL_DEMO_CONFIG
              value: "true"
            - name: OPENSEARCH_JAVA_OPTS
              value: "-Xms512m -Xmx512m"
          ports:
            - name: http
              containerPort: 9200
          volumeMounts:
            - name: data
              mountPath: /usr/share/opensearch/data
          readinessProbe:
            httpGet:
              path: /_cluster/health
              port: http
            periodSeconds: 5
            failureThreshold: 60
          livenessProbe:
            httpGet:
              path: /_cluster/health
              port: http
            initialDelaySeconds: 60
            periodSeconds: 10
            failureThreshold: 6
          resources:
            requests:
              cpu: 100m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
      volumes:
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: opensearch
  namespace: opensearch
spec:
  selector:
    app: opensearch
  ports:
    - name: http
      port: 9200
      targetPort: 9200
      protocol: TCP
