apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: homelab-k3s-mcp
  namespace: homelab-k3s-mcp
  labels:
    app.kubernetes.io/name: homelab-k3s-mcp
    app.kubernetes.io/component: server
    app.kubernetes.io/part-of: homelab
spec:
  ingressClassName: traefik
  rules:
    - host: mcp.homelab.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: homelab-k3s-mcp
                port:
                  name: http
