apiVersion: apps/v1
kind: Deployment
metadata:
  name: homelab-k3s-mcp
  namespace: homelab-k3s-mcp
  labels:
    app.kubernetes.io/name: homelab-k3s-mcp
    app.kubernetes.io/component: server
    app.kubernetes.io/part-of: homelab
spec:
  replicas: 1
  revisionHistoryLimit: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: homelab-k3s-mcp
      app.kubernetes.io/component: server
  template:
    metadata:
      labels:
        app.kubernetes.io/name: homelab-k3s-mcp
        app.kubernetes.io/component: server
        app.kubernetes.io/part-of: homelab
    spec:
      serviceAccountName: homelab-k3s-mcp
      automountServiceAccountToken: true
      nodeSelector:
        kubernetes.io/arch: arm64
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: server
          image: ghcr.io/dlddu/homelab-k3s-mcp:latest
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          env:
            - name: LISTEN_ADDR
              value: 0.0.0.0:3000
            - name: RUST_LOG
              value: info
            - name: GITHUB_APP_PRIVATE_KEY_PATH
              value: /etc/github-app/private-key.pem
          envFrom:
            - configMapRef:
                name: homelab-k3s-mcp-oauth
            - configMapRef:
                name: homelab-k3s-mcp-github-app
          volumeMounts:
            - name: github-app-key
              mountPath: /etc/github-app
              readOnly: true
          startupProbe:
            httpGet:
              path: /healthz
              port: http
            failureThreshold: 30
            periodSeconds: 1
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 2
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              cpu: 250m
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
      volumes:
        - name: github-app-key
          secret:
            secretName: homelab-k3s-mcp-github-app-key
