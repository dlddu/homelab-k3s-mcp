apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: homelab-k3s-mcp:workloads
  labels:
    app.kubernetes.io/name: homelab-k3s-mcp
    app.kubernetes.io/component: server
    app.kubernetes.io/part-of: homelab
rules:
  - apiGroups: ["apps"]
    resources:
      - deployments
      - statefulsets
      - daemonsets
    verbs:
      - get
      - list
      - watch
      - patch
  # dear_baby_reset_onboarding execs the bundled /reset-onboarding CLI
  # inside a running backend pod. List is needed to resolve the label
  # selector to a pod name; pods/exec is the subresource the apiserver
  # gates the WebSocket exec stream on.
  - apiGroups: [""]
    resources:
      - pods
    verbs:
      - get
      - list
  - apiGroups: [""]
    resources:
      - pods/exec
    verbs:
      - create
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: homelab-k3s-mcp:workloads
  labels:
    app.kubernetes.io/name: homelab-k3s-mcp
    app.kubernetes.io/component: server
    app.kubernetes.io/part-of: homelab
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: homelab-k3s-mcp:workloads
subjects:
  - kind: ServiceAccount
    name: homelab-k3s-mcp
    namespace: homelab-k3s-mcp
