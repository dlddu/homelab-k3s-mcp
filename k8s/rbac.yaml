apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: homelab-k3s-mcp:workloads
  labels:
    app.kubernetes.io/name: homelab-k3s-mcp
    app.kubernetes.io/component: server
    app.kubernetes.io/part-of: homelab
rules:
  - apiGroups: ["apps"]
    resources:
      - deployments
      - statefulsets
      - daemonsets
    verbs:
      - get
      - list
      - watch
      - patch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: homelab-k3s-mcp:workloads
  labels:
    app.kubernetes.io/name: homelab-k3s-mcp
    app.kubernetes.io/component: server
    app.kubernetes.io/part-of: homelab
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: homelab-k3s-mcp:workloads
subjects:
  - kind: ServiceAccount
    name: homelab-k3s-mcp
    namespace: homelab-k3s-mcp
