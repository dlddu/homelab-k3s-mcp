name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  GOTOOLCHAIN: local

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: fmt + vet
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true
      - name: gofmt
        run: |
          unformatted="$(gofmt -l .)"
          if [ -n "$unformatted" ]; then
            echo "These files are not gofmt-ed:"
            echo "$unformatted"
            exit 1
          fi
      - name: go vet
        run: go vet ./...
      - name: go build
        run: go build ./...

  unit-tests:
    name: unit tests
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true
      - name: go test
        run: go test ./... -v

  integration-tests:
    name: integration tests
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true

      - name: go test
        run: go test ./... -v

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python integration test deps
        run: pip install -r tests/integration/requirements.txt

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          load: true
          tags: homelab-k3s-mcp:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

      - name: Create kind cluster
        uses: helm/kind-action@v1
        with:
          cluster_name: homelab-k3s-mcp
          wait: 120s

      - name: Load image into kind
        run: kind load docker-image homelab-k3s-mcp:ci --name homelab-k3s-mcp

      - name: Deploy github-mock fixture
        run: kubectl apply -f tests/k8s/kind/github-mock.yaml

      - name: Deploy grafana-mock fixture
        run: kubectl apply -f tests/k8s/kind/grafana-mock.yaml

      - name: Deploy MinIO fixture
        run: kubectl apply -f tests/k8s/kind/minio.yaml

      - name: Create homelab-k3s-mcp namespace
        run: kubectl create namespace homelab-k3s-mcp --dry-run=client -o yaml | kubectl apply -f -

      - name: Create test GitHub App secret
        run: |
          openssl genrsa -out /tmp/github-app-test-key.pem 2048
          kubectl -n homelab-k3s-mcp create secret generic homelab-k3s-mcp-github-app \
            --from-literal=GITHUB_APP_CLIENT_ID=Iv1.testclientid12345 \
            --from-literal=GITHUB_APP_INSTALLATION_ID=67890 \
            --from-literal=GITHUB_API_BASE_URL=http://github-mock.github-mock.svc.cluster.local \
            --from-file=GITHUB_APP_PRIVATE_KEY=/tmp/github-app-test-key.pem \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Create test AWS config secret
        run: |
          kubectl -n homelab-k3s-mcp create secret generic homelab-k3s-mcp-aws-config \
            --from-literal=AWS_CONFIG_S3_BUCKET=ci-config-bucket \
            --from-literal=AWS_CONFIG_S3_KEY=aws/config \
            --from-literal=AWS_CONFIG_ROLE_ARN=arn:aws:iam::000000000000:role/ci-config-reader \
            --from-literal=AWS_CONFIG_S3_REGION=us-east-1 \
            --from-literal=AWS_CONFIG_S3_ENDPOINT=http://minio.minio.svc.cluster.local:9000 \
            --from-literal=AWS_ACCESS_KEY_ID=minioadmin \
            --from-literal=AWS_SECRET_ACCESS_KEY=minioadmin \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Create test Grafana Cloud secret
        run: |
          kubectl -n homelab-k3s-mcp create secret generic homelab-k3s-mcp-grafana-cloud \
            --from-literal=GRAFANA_CLOUD_ACCESS_POLICY_TOKEN=glc_ci_management_token \
            --from-literal=GRAFANA_CLOUD_ACCESS_POLICY_ID=ap-ci-readonly \
            --from-literal=GRAFANA_CLOUD_REGION=prod-ci \
            --from-literal=GRAFANA_API_BASE_URL=http://grafana-mock.grafana-mock.svc.cluster.local \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy via kustomize (kind overlay)
        run: kubectl apply -k tests/k8s/kind

      - name: Apply workload test fixture
        run: kubectl apply -f tests/k8s/kind/test-deployment.yaml

      - name: Apply dear-baby exec fixture
        run: kubectl apply -f tests/k8s/kind/dear-baby-fixture.yaml

      - name: Wait for github-mock rollout
        run: kubectl -n github-mock rollout status deploy/github-mock --timeout=180s

      - name: Wait for grafana-mock rollout
        run: kubectl -n grafana-mock rollout status deploy/grafana-mock --timeout=180s

      - name: Wait for MinIO rollout
        run: kubectl -n minio rollout status deploy/minio --timeout=180s

      - name: Wait for MinIO seed job
        run: kubectl -n minio wait --for=condition=complete job/minio-seed --timeout=120s

      - name: Wait for rollout
        run: kubectl -n homelab-k3s-mcp rollout status deploy/homelab-k3s-mcp --timeout=180s

      - name: Wait for fixture rollout
        run: kubectl -n workload-test rollout status deploy/workload-fixture --timeout=120s

      - name: Wait for dear-baby fixture rollout
        run: kubectl -n dear-baby-test rollout status deploy/dear-baby-fixture --timeout=120s

      - name: Smoke test deployed service
        run: |
          kubectl -n homelab-k3s-mcp port-forward svc/homelab-k3s-mcp 8080:80 >/tmp/pf.log 2>&1 &
          PF_PID=$!
          trap "kill $PF_PID" EXIT
          python tests/integration/smoke.py http://127.0.0.1:8080

      - name: Validate workload tool against fixture
        run: |
          kubectl -n homelab-k3s-mcp port-forward svc/homelab-k3s-mcp 8081:80 >/tmp/pf-workload.log 2>&1 &
          PF_PID=$!
          trap "kill $PF_PID" EXIT
          python tests/integration/workload.py http://127.0.0.1:8081

      - name: Validate dear_baby_reset_onboarding tool against fixture
        run: |
          kubectl -n homelab-k3s-mcp port-forward svc/homelab-k3s-mcp 8082:80 >/tmp/pf-reset.log 2>&1 &
          PF_PID=$!
          trap "kill $PF_PID" EXIT
          python tests/integration/dear_baby.py http://127.0.0.1:8082

      - name: Validate github_app_installation_token tool against mock
        run: |
          kubectl -n homelab-k3s-mcp port-forward svc/homelab-k3s-mcp 8083:80 >/tmp/pf-gh.log 2>&1 &
          PF_PID=$!
          trap "kill $PF_PID" EXIT
          python tests/integration/github_app.py http://127.0.0.1:8083

      - name: Validate grafana_cloud_token tool against mock
        run: |
          kubectl -n homelab-k3s-mcp port-forward svc/homelab-k3s-mcp 8085:80 >/tmp/pf-grafana.log 2>&1 &
          PF_PID=$!
          trap "kill $PF_PID" EXIT
          python tests/integration/grafana_cloud.py http://127.0.0.1:8085

      - name: Validate aws_config_get tool against MinIO
        run: |
          kubectl -n homelab-k3s-mcp port-forward svc/homelab-k3s-mcp 8084:80 >/tmp/pf-aws.log 2>&1 &
          PF_PID=$!
          trap "kill $PF_PID" EXIT
          python tests/integration/aws_config.py http://127.0.0.1:8084

      - name: Dump cluster diagnostics on failure
        if: failure()
        run: |
          kubectl -n homelab-k3s-mcp get all -o wide || true
          kubectl -n homelab-k3s-mcp describe deploy/homelab-k3s-mcp || true
          kubectl -n homelab-k3s-mcp logs deploy/homelab-k3s-mcp --tail=200 || true
          kubectl -n workload-test get all -o wide || true
          kubectl -n workload-test describe deploy/workload-fixture || true
          kubectl -n dear-baby-test get all -o wide || true
          kubectl -n dear-baby-test describe deploy/dear-baby-fixture || true
          kubectl -n dear-baby-test logs deploy/dear-baby-fixture --tail=200 || true
          kubectl -n github-mock get all -o wide || true
          kubectl -n github-mock describe deploy/github-mock || true
          kubectl -n github-mock logs deploy/github-mock --tail=200 || true
          kubectl -n grafana-mock get all -o wide || true
          kubectl -n grafana-mock describe deploy/grafana-mock || true
          kubectl -n grafana-mock logs deploy/grafana-mock --tail=200 || true
          kubectl -n minio get all -o wide || true
          kubectl -n minio describe deploy/minio || true
          kubectl -n minio logs deploy/minio --tail=200 || true
          kubectl -n minio logs job/minio-seed --tail=200 || true

  docker:
    name: docker build & push
    runs-on: ubuntu-24.04-arm
    needs: [lint, unit-tests, integration-tests]
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=sha,format=short
            type=raw,value=latest
          labels: |
            org.opencontainers.image.title=homelab-k3s-mcp
            org.opencontainers.image.source=https://github.com/${{ github.repository }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false
