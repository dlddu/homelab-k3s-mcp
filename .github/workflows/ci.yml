name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"
  RUST_BACKTRACE: 1

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: fmt + clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: cargo fmt --check
        run: cargo fmt --all -- --check
      - name: cargo clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

  unit-tests:
    name: unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: cargo test --lib --bins
        run: cargo test --lib --bins --verbose

  integration-tests:
    name: integration tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: cargo build --tests
        run: cargo build --tests --verbose
      - name: cargo test --tests
        run: cargo test --tests --verbose -- --nocapture
      - name: smoke test binary
        run: |
          cargo build --release
          LISTEN_ADDR=127.0.0.1:3000 ./target/release/homelab-k3s-mcp &
          SERVER_PID=$!
          trap "kill $SERVER_PID" EXIT
          for i in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:3000/healthz > /dev/null; then
              echo "server is up"
              break
            fi
            sleep 1
          done
          curl -fsS http://127.0.0.1:3000/healthz | tee /tmp/healthz.json
          grep -q '"status":"ok"' /tmp/healthz.json
